AWSTemplateFormatVersion: '2010-09-09'
Description: >
  IAM automation lab: one-time password secret, S3 and EC2 permission
  groups, and three console-access IAM users with forced password reset.

Parameters:
# v2.1
  Ec2User1Name:
    Type: String
    Default: ec2-user1
    Description: Username for the first EC2 group member

  Ec2User2Name:
    Type: String
    Default: ec2-user2
    Description: Username for the second EC2 group member (denied instance creation)

  S3UserName:
    Type: String
    Default: s3-user
    Description: Username for the S3-only group member

  Ec2GroupName:
    Type: String
    Default: EC2-Manage-Group
    Description: IAM group name granting EC2 list and create permissions

  S3GroupName:
    Type: String
    Default: S3-ListBuckets-Group
    Description: IAM group name granting S3 list permissions

  SecretName:
    Type: String
    Default: iam-lab-temp-password
    Description: Name of the Secrets Manager secret holding the shared temporary password

  TempPasswordLength:
    Type: Number
    Default: 16
    MinValue: 8
    MaxValue: 128
    Description: Length of the auto-generated temporary password

Resources:

  OneTimePasswordSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Ref SecretName
      Description: Temporary console password shared by initial IAM users
      GenerateSecretString:
        SecretStringTemplate: '{}'
        GenerateStringKey: password
        PasswordLength: !Ref TempPasswordLength
        ExcludePunctuation: true

  S3ReadOnlyGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: !Ref S3GroupName
      Policies:
        - PolicyName: S3ListBucketsOnly
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: AllowListS3Buckets
                Effect: Allow
                Action:
                  - s3:ListAllMyBuckets
                  - s3:GetBucketLocation
                Resource: '*'

EC2ManageGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: !Ref Ec2GroupName
      Policies:
        - PolicyName: EC2ListAndCreate
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: AllowListEC2
                Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:DescribeInstanceStatus
                  - ec2:DescribeImages
                  - ec2:DescribeInstanceTypes
                  - ec2:DescribeKeyPairs
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeVpcs
                  - ec2:DescribeSubnets
                  - ec2:DescribeAvailabilityZones
                  - ec2:DescribeVolumes
                  - ec2:DescribeTags
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DescribeAccountAttributes
                  - ec2:DescribeLaunchTemplates
                  - ec2:DescribeLaunchTemplateVersions
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeKeyPairs
                Resource: '*'
              - Sid: AllowCreateEC2
                Effect: Allow
                Action:
                  - ec2:RunInstances
                  - ec2:CreateTags
                Resource: '*'

  EC2User1:
    Type: AWS::IAM::User
    Properties:
      UserName: !Ref Ec2User1Name
      Groups:
        - !Ref EC2ManageGroup
      LoginProfile:
        Password: !Sub '{{resolve:secretsmanager:${OneTimePasswordSecret}:SecretString:password}}'
        PasswordResetRequired: true

  EC2User2:
    Type: AWS::IAM::User
    Properties:
      UserName: !Ref Ec2User2Name
      Groups:
        - !Ref EC2ManageGroup
      LoginProfile:
        Password: !Sub '{{resolve:secretsmanager:${OneTimePasswordSecret}:SecretString:password}}'
        PasswordResetRequired: true
      Policies:
        - PolicyName: DenyEC2Launch
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: DenyRunInstances
                Effect: Deny
                Action:
                  - ec2:RunInstances
                Resource: '*'

  S3User:
    Type: AWS::IAM::User
    Properties:
      UserName: !Ref S3UserName
      Groups:
        - !Ref S3ReadOnlyGroup
      LoginProfile:
        Password: !Sub '{{resolve:secretsmanager:${OneTimePasswordSecret}:SecretString:password}}'
        PasswordResetRequired: true

Outputs:
  ConsoleSignInURL:
    Description: Console sign-in URL for these IAM users
    Value: !Sub 'https://${AWS::AccountId}.signin.aws.amazon.com/console'
  SecretArn:
    Description: ARN of the Secrets Manager secret holding the one-time password
    Value: !Ref OneTimePasswordSecret
